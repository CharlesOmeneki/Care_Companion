<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Notifications Admin Login</title>
  <style>
    :root{
      --bg:#f0f4f8;
      --card:#ffffff;
      --text:#0f172a;
      --line:#e6eef2;
      --primary:#0ea5a0;
      --flash:#fde68a;
    }

    *{box-sizing:border-box}

    body{
      font-family:Inter,system-ui,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
      background:var(--bg);
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:100vh;
      margin:0;
      padding:16px;
      color:var(--text);
    }

    .card{
      background:var(--card);
      padding:28px;
      border-radius:12px;
      box-shadow:0 10px 30px rgba(2,6,23,.08);
      width:420px;
      max-width:100%;
    }

    h2{
      margin:0 0 12px 0;
      line-height:1.2;
      font-size:28px;
    }

    label{
      display:block;
      margin-top:10px;
      margin-bottom:6px;
      font-weight:600;
    }

    input{
      width:100%;
      padding:10px 12px;
      margin:8px 0;
      border-radius:8px;
      border:1px solid var(--line);
      font:inherit;
      outline:none;
      background:#fff;
      color:var(--text);
    }

    input:focus{
      border-color:#9fe7e3;
      box-shadow:0 0 0 3px rgba(14,165,160,.10);
    }

    button{
      width:100%;
      padding:10px 12px;
      border-radius:8px;
      border:0;
      background:var(--primary);
      color:#fff;
      font-weight:600;
      cursor:pointer;
      font:inherit;
      margin-top:10px;
    }

    .flash{
      padding:8px 10px;
      border-radius:8px;
      background:var(--flash);
      margin-bottom:10px;
      word-break:break-word;
    }

    @media (max-width: 600px){
      body{
        align-items:flex-start;
        padding:12px;
      }

      .card{
        width:100%;
        padding:18px;
        border-radius:10px;
        margin-top:20px;
      }

      h2{
        font-size:22px;
        margin-bottom:10px;
      }

      label{
        font-size:14px;
        margin-top:8px;
      }

      input{
        font-size:16px;
        padding:11px 12px;
      }

      button{
        padding:11px 12px;
      }

      .flash{
        font-size:14px;
      }
    }

    @media (max-height: 620px){
      body{
        align-items:flex-start;
        padding-top:10px;
        padding-bottom:10px;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <h2>Notifications Admin</h2>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for cat, msg in messages %}
          <div class="flash">{{ msg }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="post" action="{{ url_for('notif_admin_login') }}">
      <label>Password</label>
      <input type="password" name="password" placeholder="Enter admin password" required/>
      <input type="hidden" name="next" value="{{ next or '' }}" />
      <button type="submit">Login</button>
    </form>
  </div>
</body>
</html>
