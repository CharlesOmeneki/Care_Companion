<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{{ title or "Notification from Care Companion" }}</title>
  <style>
    body { margin:0; padding:0; background:#f5f8fc; font-family: Arial, Helvetica, sans-serif; color:#0f172a;}
    table{border-collapse:collapse;}
    .button{display:inline-block;padding:10px 14px;border-radius:9px;text-decoration:none;font-weight:700;}
    /* header text style larger */
    .header-title { font-size:20px; font-weight:800; color:#e6f6ff; letter-spacing:0.2px; }
    @media (max-width:480px){ .header-title{font-size:18px} }
  </style>
</head>
<body>
  <table width="100%" cellpadding="0" cellspacing="0" role="presentation">
    <tr>
      <td align="center" style="padding:28px 12px;">
        <table width="600" cellpadding="0" cellspacing="0" role="presentation" style="max-width:600px;background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 10px 22px rgba(6,43,76,0.06);">
          <tr>
            <!-- BLUE HEADER: logo removed, text enlarged -->
            <td style="padding:18px 20px;background:linear-gradient(90deg,#2a86d4,#1e6fb8);color:#fff;">
              <div class="header-title">Care Companion</div>
            </td>
          </tr>

          <tr>
            <td style="padding:20px;">
              <h2 style="margin:0 0 8px;color:#062b5a;">{{ title }}</h2>
              <div style="color:#334155;font-size:14px;line-height:1.45;">
                {{ message | safe }}
              </div>

              <div style="margin-top:18px;">
                <!-- prefer home_url (if caller passed it), else use profile_url, else fall back to '#' -->
                <a href="{{ home_url or profile_url or '#' }}" class="button" style="background:linear-gradient(90deg,#2a86d4,#1e6fb8);color:#fff;border-radius:10px;">
                  Proceed &#8594; Care Companion
                </a>
              </div>
            </td>
          </tr>

          <tr>
            <td style="padding:12px 18px;background:#f1f7ff;color:#616f7f;font-size:12px;text-align:center;">
              © Care Companion {{ current_year or "" }}
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
